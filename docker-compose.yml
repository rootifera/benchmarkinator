services:
  benchmarkinator-db:
    image: mysql:8.4
    container_name: benchmarkinator-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot $${MYSQL_ROOT_PASSWORD:+-p$${MYSQL_ROOT_PASSWORD}} > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10


  benchmarkinator-api:
    build: .
    image: rootifera/benchmarkinator-api
    container_name: benchmarkinator-api
    environment:
      DATABASE_URL: "mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@benchmarkinator-db:3306/${MYSQL_DATABASE}"
      API_KEY: ${API_KEY}
      WEBADMIN: ${WEBADMIN}
      WEBPASSWORD: ${WEBPASSWORD}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-benchmarkinator_session}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:-5}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-300}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      PUBLIC_RESULTS_CACHE_SECONDS: ${PUBLIC_RESULTS_CACHE_SECONDS:-15}
      MYSQL_POOL_RECYCLE_SECONDS: ${MYSQL_POOL_RECYCLE_SECONDS:-1800}
      LOAD_HARDWARE_DATA: ${LOAD_HARDWARE_DATA}
      HARDWARE_ERA: ${HARDWARE_ERA}
    ports:
      - "127.0.0.1:${API_PORT:-12345}:12345"
    depends_on:
      benchmarkinator-db:
        condition: service_healthy
    volumes:
      - ./extras/sql:/app/extras/sql:ro
    entrypoint:
      [ "/app/wait-for-it.sh", "benchmarkinator-db:3306", "--",
        "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "12345" ]
    pull_policy: never

  benchmarkinator-admin:
    build:
      context: ./webui
      args:
        VITE_APP_MODE: admin
        NGINX_CONF: nginx.conf
    image: rootifera/benchmarkinator-admin
    container_name: benchmarkinator-admin
    ports:
      - "${ADMIN_BIND_ADDRESS:-127.0.0.1}:${ADMIN_PORT:-8001}:80"
    depends_on:
      benchmarkinator-api:
        condition: service_started
    environment:
      NODE_ENV: production
    pull_policy: never

  benchmarkinator-public:
    build:
      context: ./webui
      args:
        VITE_APP_MODE: public
        NGINX_CONF: nginx.public.conf
    image: rootifera/benchmarkinator-public
    container_name: benchmarkinator-public
    ports:
      - "${PUBLIC_BIND_ADDRESS:-127.0.0.1}:${PUBLIC_PORT:-8002}:80"
    depends_on:
      benchmarkinator-api:
        condition: service_started
    environment:
      NODE_ENV: production
    pull_policy: never

volumes:
  mysql_data:
